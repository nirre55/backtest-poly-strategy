# ============================================================
# Configuration du backtest — Polymarket style (UP / DOWN)
#
# Modèle de payout binaire :
#   - Mise gagnante : +win_payout * mise  (ex: +0.90$ pour 1$ misé)
#   - Mise perdante : +loss_payout * mise (ex: -1.00$ pour 1$ misé)
#
# Chaque stratégie peut être activée / désactivée indépendamment.
# ============================================================

general:
  starting_capital: 100.0
  output_dir: output

  # Versions à tester
  versions:
    A:
      enabled: true # tous les signaux, sans filtre horaire
    B:
      enabled: false # signaux filtrés selon time_filter_hours ci-dessous
      time_filter_hours: [4, 5, 6, 7, 8, 17] # heures autorisées (timezone America/Montreal)

  # Payouts disponibles (au moins un doit être activé)
  payouts:
    A:
      enabled: true
      win_payout: 0.90 # gain net par dollar misé si victoire
      loss_payout: -1.00 # perte nette par dollar misé si défaite
    B:
      enabled: false
      win_payout: 0.95
      loss_payout: -1.00
    C:
      enabled: false
      win_payout: 1.00
      loss_payout: -1.00

# ============================================================
# Paramètres des stratégies de signal
# Priorité : CLI > YAML > valeur par défaut du code
# ============================================================

signal_strategies:
  # ----------------------------------------------------------
  # streak_rsi — Streak consécutif + RSI7 + ATR14 + body ratio
  # ----------------------------------------------------------
  streak_rsi:
    rsi_up: 35.0 # RSI7 ≤ seuil → signal UP
    rsi_down: 65.0 # RSI7 ≥ seuil → signal DOWN
    streak_min: 3 # nombre minimum de bougies consécutives
    body_ratio_min: 0.60 # corps / range ≥ seuil
    range_atr_mult: 1.0 # range ≥ mult × ATR14
    use_streak: true
    use_rsi: true
    use_range: true
    use_body_ratio: true

  # ----------------------------------------------------------
  # wick_volume_rebound — Mèche de rejet + RSI + Volume
  # ----------------------------------------------------------
  wick_volume_rebound:
    rsi_oversold: 30.0 # RSI7 < seuil → condition UP
    rsi_overbought: 70.0 # RSI7 > seuil → condition DOWN
    wick_body_mult: 1.5 # mèche ≥ mult × corps
    vol_ma_mult: 1.25 # volume ≥ mult × vma20

  # ----------------------------------------------------------
  # wick_momentum — Rejet de mèche OU Momentum volume
  # ----------------------------------------------------------
  wick_momentum:
    rej_vol_mult: 1.5 # volume min pour le chemin Rejet (× vma20)
    rej_wick_mult: 2.0 # mèche min pour le chemin Rejet (× corps)
    mom_vol_mult: 2.5 # volume min pour le chemin Momentum (× vma20)
    mom_body_ratio: 0.8 # corps min pour le chemin Momentum (× range)

  # ----------------------------------------------------------
  # sniper — Rejet Extrême (volume flash + mèche massive)
  # ----------------------------------------------------------
  sniper:
    vol_mult: 4.0 # volume ≥ mult × vma20
    wick_mult: 3.0 # mèche ≥ mult × corps

  # ----------------------------------------------------------
  # momentum — Suivi de tendance par variation %
  # ----------------------------------------------------------
  momentum:
    threshold_pct: 0.2 # variation minimum en % pour déclencher un signal

  # ----------------------------------------------------------
  # alternating — Alternance VERTE/ROUGE avec switch de phase
  # ----------------------------------------------------------
  alternating:
    use_loss_streak_switch: false # false = alternance pure sans jamais switcher
    loss_streak_switch: 2 # nb de pertes consécutives avant d'inverser la phase

# ============================================================
# Stratégies de money management
# ============================================================

strategies:
  # ----------------------------------------------------------
  # MM1 — Mise fixe absolue
  # ----------------------------------------------------------
  MM1_flat_fixed:
    enabled: true
    base_stake: 1.0 # mise constante en dollars

  # ----------------------------------------------------------
  # MM2 — Pourcentage fixe 1 % du capital
  # ----------------------------------------------------------
  MM2_fixed_1pct:
    enabled: true
    fraction_pct: 1.0 # % du capital courant

  # ----------------------------------------------------------
  # MM3 — Pourcentage fixe 5 % du capital
  # ----------------------------------------------------------
  MM3_fixed_5pct:
    enabled: true
    fraction_pct: 5.0

  # ----------------------------------------------------------
  # MM4 — Martingale classique (doublement après perte)
  # ----------------------------------------------------------
  MM4_martingale_classic:
    enabled: true
    base_stake: 1.0 # mise initiale et mise après un gain
    # Après chaque perte : mise × 2
    # Après un gain     : reset à base_stake
    # Si capital insuffisant → ruine

  # ----------------------------------------------------------
  # MM5 — Martingale douce linéaire (+1$ après chaque perte)
  # ----------------------------------------------------------
  MM5_martingale_linear:
    enabled: true
    base_stake: 1.0 # mise initiale
    increment: 1.0 # ajout par perte consécutive (1→2→3→4…)
    # Après un gain : reset à base_stake

  # ----------------------------------------------------------
  # MM6 — Martingale limitée avec pause
  # ----------------------------------------------------------
  MM6_martingale_limited:
    enabled: true
    sequence: [1, 1, 2, 4, 8, 16, 32] # mises selon les pertes consécutives
    # Après un gain          : reset à sequence[0]
    # Après épuisement de la séquence (7 pertes) :
    #   → pause puis reset
    pause_trades: 1 # nombre de signaux ignorés après épuisement

  # ----------------------------------------------------------
  # MM7 — Anti-martingale (augmenter en cas de win-streak)
  # ----------------------------------------------------------
  MM7_anti_martingale:
    enabled: true
    base_fraction_pct: 1.0 # % de base du capital
    max_fraction_pct: 10.0 # plafond absolu (% du capital)
    win_multipliers:
      - min_win_streak: 2
        multiplier: 1.25
      - min_win_streak: 3
        multiplier: 1.50
    # Après une perte : reset win_streak, retour à base_fraction_pct

  # ----------------------------------------------------------
  # MM8 — Réduction de mise après pertes consécutives
  # ----------------------------------------------------------
  MM8_reduction_after_losses:
    enabled: true
    base_fraction_pct: 1.0
    loss_steps:
      - min_loss_streak: 3
        fraction_pct: 2.5 # mise réduite après 3 pertes d'affilée
      - min_loss_streak: 5
        fraction_pct: 1.0 # mise encore réduite après 5 pertes
    # Après un gain : reset à base_fraction_pct

  # ----------------------------------------------------------
  # MM9 — Pause après N pertes consécutives
  # ----------------------------------------------------------
  MM9_pause_after_losses:
    enabled: true
    base_fraction_pct: 1.0
    pause_after_n_losses: 5 # nombre de pertes consécutives avant pause
    pause_trades: 10 # nombre de signaux ignorés
    # Après un gain : reset du compteur de pertes

  # ----------------------------------------------------------
  # MM10 — Combiné agressif-survivable
  # ----------------------------------------------------------
  MM10_combined:
    enabled: true
    base_fraction_pct: 1.0
    max_fraction_pct: 10.0
    win_multipliers:
      - min_win_streak: 2
        multiplier: 1.25
      - min_win_streak: 3
        multiplier: 1.50
    loss_steps:
      - min_loss_streak: 3
        fraction_pct: 2.5
      - min_loss_streak: 5
        fraction_pct: 1.0
    pause_after_n_losses: 7 # pause après 7 pertes
    pause_trades: 1

  # ----------------------------------------------------------
  # MM11 — Alternance 1 % / 2.5 % selon parité des pertes
  # ----------------------------------------------------------
  MM11_alternating:
    enabled: true
    base_fraction_pct: 1.0 # mise de base (0 perte en cours)
    odd_loss_fraction_pct: 2.5 # mise si nombre de pertes consécutives impair
    even_loss_fraction_pct: 1.0 # mise si nombre de pertes consécutives pair
    # Après un gain : reset à base_fraction_pct
